<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F3EBDD">
  <title>Bar — Préparation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="brand">
      <div class="eyebrow">Service — l'hôte</div>
      <h1 id="party-name">La Villa</h1>
      <div class="rule"></div>
    </div>

    <div class="host-head">
      <div class="counter">
        <b id="pending-count">0</b>
        <span>en attente</span>
      </div>
      <button class="btn ghost" id="qr-btn" style="width:auto; padding:12px 16px">▣ QR code</button>
    </div>

    <div class="seg" id="seg" style="margin-bottom:6px">
      <button data-mode="time"  aria-selected="true">Chronologique</button>
      <button data-mode="guest" aria-selected="false">Par invité</button>
      <button data-mode="drink" aria-selected="false">Par boisson</button>
    </div>

    <div id="queue"></div>
  </main>

  <!-- QR plein écran -->
  <div class="qr" id="qr">
    <h2>Scanne pour commander</h2>
    <div class="box" id="qr-box"></div>
    <div class="url" id="qr-url"></div>
    <button class="btn secondary" id="qr-close" style="max-width:280px">Fermer</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="menu.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
